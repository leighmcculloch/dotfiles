# Set prefix
unbind C-b
set -g prefix C-a
bind a send-prefix

# Bell only on inactive windows
set -g bell-action other

# Map M-k clear the pane and buffer
#bind-key -n M-r send-keys -R C-c\; send-keys -R Enter \; clear-history
bind-key -n M-r respawn-pane -k

# Map the X sequence to kill-window
bind x confirm-before -p "kill-pane #{pane_id}? (y/n)" kill-pane
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# Remove the current directory of the focused pane (runs rmd in a popup)
bind D display-popup -E -d '#{pane_current_path}' rmd

# Reload source file
bind r source ~/.tmux.conf

# Allow OSC 52 to pass through to the outer terminal
set -g set-clipboard on
set -g allow-passthrough on

# Capture visible pane to tmux buffer and clipboard
bind y capture-pane \; run-shell "tmux save-buffer - | pbcopy"
bind Y run-shell tmux-capture-other-panes

# Set shell
#set -g default-terminal tmux-256color
#set -ga terminal-overrides ",xterm-256color:Tc"

# Forward focus events to applications (enables FocusGained/FocusLost in vim)
set -g focus-events on

# Window navigation using vim controls
setw -g mode-keys vi

# Window and pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window names stop auto-renaming after they have been set explicitly
set -g allow-rename off

# Create new window
bind c new-window -c '#{pane_current_path}'
bind -n M-c new-window -a -c '#{pane_current_path}' \; if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" "send-keys 'cdm; gwau' Enter"
bind C new-window -a -c '#{pane_current_path}' \; if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" "send-keys 'cdm; gwau' Enter"

# Split windows
bind s split-window -v -c '#{pane_current_path}'
bind v split-window -h -c '#{pane_current_path}'
bind -n M-s split-window -v -c '#{pane_current_path}'
bind -n M-v split-window -h -c '#{pane_current_path}'

# Moving windows
bind , swap-window -t -1 \; select-window -t -1
bind . swap-window -t +1 \; select-window -t +1
bind -n M-, swap-window -t -1 \; select-window -t -1
bind -n M-. swap-window -t +1 \; select-window -t +1

# Move around panes with hjkl
bind h select-pane -L
bind j select-pane -D \; if -F "#{==:#{pane_height},1}" "resize-pane -y 100%" ""
bind k select-pane -U \; if -F "#{==:#{pane_height},1}" "resize-pane -y 100%" ""
bind l select-pane -R
bind H if -F '#{pane_at_left}' '' 'run-shell "tmux swap-pane -t \"{left-of}\" && tmux select-pane -t \"#{pane_id}\""'
bind J if -F '#{pane_at_bottom}' '' 'run-shell "tmux swap-pane -t \"{down-of}\" && tmux select-pane -t \"#{pane_id}\""'
bind K if -F '#{pane_at_top}' '' 'run-shell "tmux swap-pane -t \"{up-of}\" && tmux select-pane -t \"#{pane_id}\""'
bind L if -F '#{pane_at_right}' '' 'run-shell "tmux swap-pane -t \"{right-of}\" && tmux select-pane -t \"#{pane_id}\""'
bind -n M-h select-pane -L
bind -n M-j select-pane -D \; if -F "#{==:#{pane_height},1}" "resize-pane -y 100%" ""
bind -n M-k select-pane -U \; if -F "#{==:#{pane_height},1}" "resize-pane -y 100%" ""
bind -n M-l select-pane -R

# Resize panes
bind -r e resize-pane -y 100%
bind -r < resize-pane -L 2
bind -r > resize-pane -R 2
bind -r - resize-pane -D 2
bind -r + resize-pane -U 2
bind -r = resize-pane -U 2
bind -n M-< resize-pane -L 2
bind -n M-> resize-pane -R 2
bind -n M-- resize-pane -D 2
bind -n M-+ resize-pane -U 2
bind -n M-= resize-pane -U 2

# Popup pane (prefix+o to toggle)
bind o if-shell -F '#{==:#{session_name},popup}' 'detach-client' 'display-popup -E "tmux attach -t popup || tmux new -s popup"'

# Update Interval
set -g status-interval 5

# Update Display Time of Tmux Messages to 4 secs
set-option -g display-time 4000

# Increase Scrollback Buffer size
set-option -g history-limit 50000

# Enable mouse support
setw -g mouse on

# Theme --

# Status bar
set -g status-bg '#2c2e33'
set -g status-fg white

# Status bar - left side
set -g status-left ''

# Status bar - right side
set -g status-right-length 100
set -g status-right ' #{?window_zoomed_flag,#[fg=black#,bg=brightcyan]ZOOMED#[fg=colour238#,bg=default] • ,}#[fg=colour238]#S'

# Mark window as unread (toggle with prefix+u, cleared when switching to window)
bind u if-shell -F '#{@unread}' 'set-option -w -u @unread' 'set-option -w @unread 1'
set-hook -g after-select-window 'set-option -w -u @unread'

# Keep windows from the same git repo adjacent (prefix+G to re-sort manually)
bind G run-shell -b 'tmux-regroup-windows'
set-hook -g after-new-window 'run-shell -b "tmux-regroup-windows"'

# Window list (prefix+w) - fuzzy search via fzf in a popup
set -g mode-style 'bg=#5a5d63,fg=white'
bind w display-popup -E -w 80% -h 70% 'tmux-window-fzf'

# Window status - separator between window boxes
set -g window-status-separator ''

# Window status - not the current window
set-window-option -g window-status-format         '#[fg=white#,bg=#2c2e33]#(tmux-window-repo "#{pane_current_path}" "#S" "#I" "white")#I #{?#{||:#{@unread},#{window_bell_flag}},#[bold#,fg=brightyellow],}#(tmux-window-branch "#{pane_current_path}")#{?#{||:#{@unread},#{window_bell_flag}},#[nobold#,fg=white],}#[default]'

# Window status - not the current window with bell
set-window-option -g window-status-bell-style     ''

# Window status - current window
set-window-option -g window-status-current-format '#[fg=white#,bg=#2c2e33]#(tmux-window-repo "#{pane_current_path}" "#S" "#I" "white")#[bg=colour240] #I #{?#{||:#{@unread},#{window_bell_flag}},#[bold#,fg=brightyellow],#[bold#,fg=brightwhite]}#(tmux-window-branch "#{pane_current_path}")#[nobold#,fg=white] #[default]'

# Panes
set -g message-style fg=black,bg=white
set -g pane-border-format '#(pwd="#{pane_current_path}"; echo ${pwd####*/}):#{pane_current_command}'
set -g pane-border-style bg=default,fg=#444444
set -g pane-active-border-style bg=default,fg=#606060
set-option -g pane-border-lines single
set-option -g pane-border-indicators colour
set-option -g pane-border-status top
set -g window-style 'fg=colour247,bg=#2c2e33'
set -g window-active-style 'fg=#ffffff,bg=#2c2e33'
